name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - "claude/**"
      - master
      - main
    paths:
      - "android/**"
      - "server/**"
      - "client/**"
      - "shared/**"
      - ".github/workflows/android.yml"

permissions:
  contents: write # create releases on master builds

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build client
        working-directory: client
        run: |
          npm ci --no-fund --no-audit
          npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build signed release APK
        run: gradle -p android :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk wayward.apk

      - uses: actions/upload-artifact@v4
        with:
          name: wayward-apk
          path: wayward.apk
          if-no-files-found: error

      # Every master build becomes a GitHub Release so the phone (via
      # Obtainium) can discover and install updates itself.
      - name: Publish release
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: Wayward 0.1.${{ github.run_number }}
          body: |
            Automated build from `${{ github.sha }}`.

            ${{ github.event.head_commit.message }}
          files: wayward.apk
