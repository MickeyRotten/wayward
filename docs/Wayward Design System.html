  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nts<\u002Fa>\n      <a href=\"#layout\" style=\"font-family:var(--fui);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--textsec);text-decoration:none;padding:18px 16px;white-space:nowrap\" onmouseover=\"this.style.color='var(--gold2)'\" onmouseout=\"this.style.color='var(--textsec)'\">Layout<\u002Fa>\n      <a href=\"#tokens\" style=\"font-family:var(--fui);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--textsec);text-decoration:none;padding:18px 16px;white-space:nowrap\" onmouseover=\"this.style.color='var(--gold2)'\" onmouseout=\"this.style.color='var(--textsec)'\">Token Reference<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- HERO -->\n  <header style=\"padding:96px 48px 80px;max-width:960px;border-bottom:1px solid var(--line)\">\n    <div style=\"display:flex;align-items:center;gap:18px;margin-bottom:32px\">\n      <span style=\"width:22px;height:22px;border:2px solid var(--gold);transform:rotate(45deg);flex:none\"><\u002Fspan>\n      <span style=\"font-family:var(--fui);font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:var(--textdim)\">Wayward · v1.0 · 2026<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:var(--fdisp);font-size:52px;color:var(--gold2);letter-spacing:.04em;margin:0 0 20px;padding-top:4px;line-height:1.1;text-wrap:balance\">Design System<\u002Fh1>\n    <p style=\"font-family:var(--fbody);font-size:17px;line-height:1.72;color:var(--text2);margin:0;max-width:640px;text-wrap:pretty\">A complete visual language for Wayward — an LLM-powered tabletop narrator interface. All colors, typography, spacing, and component patterns documented for implementation in any environment.<\u002Fp>\n  <\u002Fheader>\n\n  <div style=\"max-width:960px;padding:0 48px 120px\">\n\n    <!-- ═══════════════════════════ PHILOSOPHY ═══════════════════════════ -->\n    <section id=\"philosophy\" style=\"padding-top:72px\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:32px\">\n        <span style=\"font-family:var(--fui);font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)\">01<\u002Fspan>\n        <span style=\"font-family:var(--fdisp);font-size:28px;color:var(--text);letter-spacing:.04em;padding-top:3px\">Philosophy<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:var(--line)\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:40px\">\n        <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:20px 22px\">\n          <div style=\"font-family:var(--fdisp);font-size:15px;color:var(--gold2);margin-bottom:10px;padding-top:2px\">Manuscript at Night<\u002Fdiv>\n          <div style=\"font-family:var(--fbody);font-size:13px;line-height:1.65;color:var(--text2)\">Dark, warm, gold-accented. Evokes old parchment and candlelight without being literal about it.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:20px 22px\">\n          <div style=\"font-family:var(--fdisp);font-size:15px;color:var(--gold2);margin-bottom:10px;padding-top:2px\">Amber Warmth<\u002Fdiv>\n          <div style=\"font-family:var(--fbody);font-size:13px;line-height:1.65;color:var(--text2)\">No gradients on backgrounds, no neon, no hard whites. Every surface carries amber warmth.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:20px 22px\">\n          <div style=\"font-family:var(--fdisp);font-size:15px;color:var(--gold2);margin-bottom:10px;padding-top:2px\">Typographic Hierarchy<\u002Fdiv>\n          <div style=\"font-family:var(--fbody);font-size:13px;line-height:1.65;color:var(--text2)\">Three distinct typefaces: display, body, and UI chrome — each with a precise role, never mixed.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid rgba(201,165,88,.28);border-radius:3px;background:rgba(201,165,88,.04);padding:20px 24px\">\n        <div style=\"font-family:var(--fui);font-size:8px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-bottom:10px\">Core Principle<\u002Fdiv>\n        <div style=\"font-family:var(--fbody);font-size:15px;line-height:1.7;color:var(--text)\">Every surface has amber warmth. Text is never pure white. Backgrounds are never pure black. The entire palette exists on a narrow warm-amber axis — even the coolest accent (steel blue, <code style=\"display:inline;font-size:13px;color:var(--blue);background:none;white-space:normal\">--blue<\u002Fcode>) leans warm.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ═══════════════════════════ COLORS ═══════════════════════════ -->\n    <section id=\"colors\" style=\"padding-top:80px\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:32px\">\n        <span style=\"font-family:var(--fui);font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)\">02<\u002Fspan>\n        <span style=\"font-family:var(--fdisp);font-size:28px;color:var(--text);letter-spacing:.04em;padding-top:3px\">Color<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:var(--line)\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- Backgrounds -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Backgrounds — Four Depth Levels<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:36px\">\n        <div>\n          <div style=\"height:72px;border-radius:3px;background:#100e0a;border:1px solid rgba(201,165,88,.1)\"><\u002Fdiv>\n          <div style=\"margin-top:9px\">\n            <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.12em;color:var(--text)\">--bg0<\u002Fdiv>\n            <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--textsec);margin-top:2px\">#100e0a<\u002Fdiv>\n            <div style=\"font-family:var(--fbody);font-size:11px;color:var(--textdim);margin-top:3px\">Near-black shell, chat area<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"height:72px;border-radius:3px;background:#17140e;border:1px solid rgba(201,165,88,.1)\"><\u002Fdiv>\n          <div style=\"margin-top:9px\">\n            <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.12em;color:var(--text)\">--bg1<\u002Fdiv>\n            <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--textsec);margin-top:2px\">#17140e<\u002Fdiv>\n            <div style=\"font-family:var(--fbody);font-size:11px;color:var(--textdim);margin-top:3px\">Primary panels, sidebars<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"height:72px;border-radius:3px;background:#1e1a12;border:1px solid rgba(201,165,88,.1)\"><\u002Fdiv>\n          <div style=\"margin-top:9px\">\n            <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.12em;color:var(--text)\">--bg2<\u002Fdiv>\n            <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--textsec);margin-top:2px\">#1e1a12<\u002Fdiv>\n            <div style=\"font-family:var(--fbody);font-size:11px;color:var(--textdim);margin-top:3px\">Cards, inputs, secondary<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"height:72px;border-radius:3px;background:#262016;border:1px solid rgba(201,165,88,.1)\"><\u002Fdiv>\n          <div style=\"margin-top:9px\">\n            <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.12em;color:var(--text)\">--bg3<\u002Fdiv>\n            <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--textsec);margin-top:2px\">#262016<\u002Fdiv>\n            <div style=\"font-family:var(--fbody);font-size:11px;color:var(--textdim);margin-top:3px\">Elevated cards, icon thumbs<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Borders -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Borders<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:36px\">\n        <div style=\"border-radius:3px;background:var(--bg1);padding:18px;border:1px solid rgba(201,165,88,.18)\">\n          <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.12em;color:var(--text)\">--line<\u002Fdiv>\n          <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--textsec);margin-top:2px\">rgba(201,165,88,.18)<\u002Fdiv>\n          <div style=\"font-family:var(--fbody);font-size:11px;color:var(--textdim);margin-top:4px\">Subtle dividers, default card borders<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius:3px;background:var(--bg1);padding:18px;border:1px solid rgba(201,165,88,.42)\">\n          <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.12em;color:var(--text)\">--line2<\u002Fdiv>\n          <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--textsec);margin-top:2px\">rgba(201,165,88,.42)<\u002Fdiv>\n          <div style=\"font-family:var(--fbody);font-size:11px;color:var(--textdim);margin-top:4px\">Strong borders, selection state, focus rings<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Gold scale -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Gold Accent Scale<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:36px\">\n        <div>\n          <div style=\"height:56px;border-radius:3px;background:#c9a558\"><\u002Fdiv>\n          <div style=\"margin-top:9px\">\n            <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.12em;color:var(--text)\">--gold<\u002Fdiv>\n            <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--textsec);margin-top:2px\">#c9a558<\u002Fdiv>\n            <div style=\"font-family:var(--fbody);font-size:11px;color:var(--textdim);margin-top:3px\">Primary: active tabs, CTAs, selection bars<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"height:56px;border-radius:3px;background:#e8cf8c\"><\u002Fdiv>\n          <div style=\"margin-top:9px\">\n            <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.12em;color:var(--text)\">--gold2<\u002Fdiv>\n            <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--textsec);margin-top:2px\">#e8cf8c<\u002Fdiv>\n            <div style=\"font-family:var(--fbody);font-size:11px;color:var(--textdim);margin-top:3px\">Brighter: hover states, text highlights, links<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"height:56px;border-radius:3px;background:#8a6f3a\"><\u002Fdiv>\n          <div style=\"margin-top:9px\">\n            <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.12em;color:var(--text)\">--golddeep<\u002Fdiv>\n            <div style=\"font-family:ui-monospace,monospace;font-size:11px;color:var(--textsec);margin-top:2px\">#8a6f3a<\u002Fdiv>\n            <div style=\"font-family:var(--fbody);font-size:11px;color:var(--textdim);margin-top:3px\">Muted: disabled states, decorative only<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Semantic + Text -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Semantic Accent<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margi round:var(--bg3);border:1px solid var(--line);border-radius:3px\"><\u002Fdiv>\n              <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.1em;color:var(--textsec);text-align:center\">3px<br><span style=\"color:var(--textdim);letter-spacing:0\">cards, panels<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px\">\n              <div style=\"width:48px;height:48px;background:var(--bg3);border:1px solid var(--line);border-radius:4px\"><\u002Fdiv>\n              <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.1em;color:var(--textsec);text-align:center\">4px<br><span style=\"color:var(--textdim);letter-spacing:0\">modals<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px\">\n              <div style=\"width:48px;height:48px;background:var(--bg3);border:1px solid var(--line);border-radius:9px\"><\u002Fdiv>\n              <div style=\"font-family:var(--fui);font-size:9px;letter-spacing:.1em;color:var(--textsec);text-align:center\">9px<br><span style=\"color:var(--textdim);letter-spacing:0\">scrollbar<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ═══════════════════════════ COMPONENTS ═══════════════════════════ -->\n    <section id=\"components\" style=\"padding-top:80px\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:32px\">\n        <span style=\"font-family:var(--fui);font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)\">05<\u002Fspan>\n        <span style=\"font-family:var(--fdisp);font-size:28px;color:var(--text);letter-spacing:.04em;padding-top:3px\">Components<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:var(--line)\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- BUTTONS -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Buttons<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px\">\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:#100e0a;background:#c9a558;border-radius:2px;padding:8px 14px;cursor:pointer\">Primary Action<\u002Fspan>\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--textsec);border:1px solid var(--line);border-radius:2px;padding:8px 14px;cursor:pointer\">Secondary<\u002Fspan>\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:#a96b54;border:1px solid rgba(169,107,84,.35);border-radius:2px;padding:8px 14px;cursor:pointer\">Delete Entry<\u002Fspan>\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);border:none;background:none;cursor:pointer\">＋ Add New<\u002Fspan>\n        <\u002Fdiv>\n        <pre><code>/* Primary */\ncolor: #100e0a; background: var(--gold); border-radius: 2px; padding: 8px 14px;\nfont-family: var(--fui); font-size: 8.5px; letter-spacing: .16em; text-transform: uppercase;\nhover: background: var(--gold2)\n\n/* Secondary / Ghost */\ncolor: var(--textsec); border: 1px solid var(--line); border-radius: 2px; padding: 8px 14px;\n\n/* Danger */\ncolor: #a96b54; border: 1px solid rgba(169,107,84,.35); border-radius: 2px; padding: 8px 14px;\nhover: background: rgba(169,107,84,.1)\n\n/* Text / Inline */\ncolor: var(--gold); no border; hover: color: var(--gold2)<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- TAGS / CHIPS -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Tags &amp; Chips<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px\">\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:#e8cf8c;border:1px solid rgba(201,165,88,.18);background:rgba(201,165,88,.06);border-radius:2px;padding:3px 7px\">Gold Chip<\u002Fspan>\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:7.5px;letter-spacing:.14em;text-transform:uppercase;color:#100e0a;background:#c9a558;border-radius:2px;padding:3px 7px\">Permanent<\u002Fspan>\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:#9b927a;border:1px solid rgba(201,165,88,.18);background:rgba(201,165,88,.06);border-radius:2px;padding:2px 6px\">Human · Cartographer<\u002Fspan>\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:#100e0a;background:#c9a558;border-radius:2px;padding:2px 6px\">Player<\u002Fspan>\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:7.5px;letter-spacing:.15em;text-transform:uppercase;color:#e8cf8c;border:1px solid rgba(201,165,88,.35);border-radius:2px;padding:4px 8px\">Top of Prompt<\u002Fspan>\n        <\u002Fdiv>\n        <pre><code>/* Standard chip */\nborder: 1px solid var(--line); background: rgba(201,165,88,.06); border-radius: 2px; padding: 2px 6px;\nfont-family: var(--fui); font-size: 8px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold2);\n\n/* Filled badge (Permanent, Player role) */\nbackground: var(--gold); color: #100e0a; /* same sizing */<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- SECTION DIVIDER -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Section Divider<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:20px\">\n          <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:#c9a558\">Equipment<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:rgba(201,165,88,.18)\"><\u002Fspan>\n        <\u002Fdiv>\n        <pre><code>display: flex; align-items: center; gap: 11px; margin-bottom: 12px;\n\n  &lt;span&gt; /* label */\n    font-family: var(--fui); font-size: 9px; letter-spacing: .26em;\n    text-transform: uppercase; color: var(--gold);\n  &lt;span style=\"flex:1; height:1px; background:var(--line)\"&gt;<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- CARDS -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Cards — List Items<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:24px\">\n          <!-- Default card -->\n          <div style=\"position:relative;display:flex;gap:12px;padding:12px;background:var(--bg1);border:1px solid var(--line);border-radius:3px;cursor:pointer\">\n            <div style=\"width:38px;height:38px;border:1px solid rgba(201,165,88,.42);border-radius:2px;background:radial-gradient(120% 110% at 50% 18%,#262016,#0c0a07);display:flex;align-items:center;justify-content:center;flex:none\"><span style=\"font-size:18px;color:#c9a558;opacity:.9;line-height:1\">⚗<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1\">\n              <div style=\"font-family:'Cinzel',serif;font-size:16px;color:#ece4d3;padding-top:2px;line-height:1.05\">Fractured Lens Array<\u002Fdiv>\n              <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:#9b927a;margin-top:6px\">Point of Interest<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Selected card -->\n          <div style=\"position:relative;display:flex;gap:12px;padding:12px;background:var(--bg2);border:1px solid var(--line);border-radius:3px;cursor:pointer\">\n            <span style=\"position:absolute;left:0;top:10px;bottom:10px;width:2px;background:#c9a558\"><\u002Fspan>\n            <div style=\"width:38px;height:38px;border:1px solid rgba(201,165,88,.42);border-radius:2px;background:radial-gradient(120% 110% at 50% 18%,#262016,#0c0a07);display:flex;align-items:center;justify-content:center;flex:none\"><span style=\"font-size:18px;color:#c9a558;opacity:.9;line-height:1\">🗝<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1\">\n              <div style=\"font-family:'Cinzel',serif;font-size:16px;color:#ece4d3;padding-top:2px;line-height:1.05\">Warden's Lockbox<\u002Fdiv>\n              <div style=\"font-family:'Hanken Grotesk',sans-serif;font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:#9b927a;margin-top:6px\">Interactable<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <pre><code>/* Default */\nposition: relative; display: flex; gap: 12px; padding: 12px;\nbackground: var(--bg1); border: 1px solid var(--line); border-radius: 3px; cursor: pointer;\n\n/* Selected — bg shifts + 2px left accent bar */\nbackground: var(--bg2);\n  &lt;span position:absolute; left:0; top:10px; bottom:10px; width:2px; background:var(--gold)&gt;\n\n/* Portrait thumbnail */\nwidth: 38px; height: 38px; border: 1px solid var(--line2); border-radius: 2px;\nbackground: radial-gradient(120% 110% at 50% 18%, var(--bg3), #0c0a07);\n\n/* PC portrait — blue border + glyph */\nborder: 1px solid var(--blue); /* glyph: color: var(--blue) */<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- INPUTS -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Inputs &amp; Textareas<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;flex-direction:column;gap:12px;max-width:480px;margin-bottom:20px\">\n          <div>\n            <label style=\"display:block;font-family:'Hanken Grotesk',sans-serif;font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:#9b927a;margin-bottom:5px\">Field Label<\u002Flabel>\n            <input placeholder=\"Text input…\" style=\"width:100%;background:#1e1a12;border:1px solid rgba(201,165,88,.18);border-radius:2px;padding:10px 12px;color:#ece4d3;font-family:'Quicksand',sans-serif;font-size:13px;outline:none;caret-color:#c9a558\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-family:'Hanken Grotesk',sans-serif;font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:#9b927a;margin-bottom:5px\">Narrative Content<\u002Flabel>\n            <textarea rows=\"3\" placeholder=\"Prose textarea…\" style=\"width:100%;background:#1e1a12;border:1px solid rgba(201,165,88,.18);border-radius:2px;padding:10px 12px;color:#cfc6b0;font-family:'Quicksand',sans-serif;font-size:13px;line-height:1.6;outline:none;resize:none;caret-color:#c9a558\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;background:#1e1a12;border:1px solid rgba(201,165,88,.18);border-radius:2px;padding:6px 10px\">\n            <input placeholder=\"Inline search input…\" style=\"flex:1;background:transparent;border:none;outline:none;font-family:'Quicksand',sans-serif;font-size:12px;color:#ece4d3;caret-color:#c9a558\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <pre><code>/* All inputs */\nbackground: var(--bg2); border: 1px solid var(--line); border-radius: 2px;\npadding: 10px 12px; color: var(--text); outline: none; caret-color: var(--gold);\nfont-family: var(--fbody); font-size: 13px; /* prose fields */\nfont-family: var(--fui); /* short label fields */\n\n/* Label above */\nfont-family: var(--fui); font-size: 7.5px; letter-spacing: .2em; text-transform: uppercase;\ncolor: var(--textsec); display: block; margin-bottom: 4–5px;<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- INLINE MESSAGE HOVER TOOLBAR -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Message Hover Toolbar<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"position:relative;display:inline-block;margin-bottom:20px\">\n          <p style=\"font-family:'Quicksand',sans-serif;font-size:18px;line-height:1.74;color:#cfc6b0;margin:0;max-width:480px\">Rain has found the broken dome, and it falls in slow silver threads across the flooded floor.<\u002Fp>\n          <div style=\"position:absolute;top:-8px;right:-2px;display:flex;gap:1px;background:#1e1a12;border:1px solid rgba(201,165,88,.18);border-radius:3px;padding:2px\">\n            <span style=\"cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#9b927a\">✎<\u002Fspan>\n            <span style=\"cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#9b927a\">↻<\u002Fspan>\n            <span style=\"cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#9b927a\">✕<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <pre><code>position: absolute; top: -8px; right: -2px;\ndisplay: flex; gap: 1px;\nbackground: var(--bg2); border: 1px solid var(--line); border-radius: 3px; padding: 2px;\nopacity: 0; transition: opacity .14s;  /* show on parent hover */\n\n  icon button: width:24px; height:24px; display:flex; align-items:center; justify-content:center;\n  font-size: 12–14px; color: var(--textsec);\n  hover: color: var(--gold2);         /* edit/regen */\n  hover: color: #c98e76;              /* delete */<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- PORTRAIT THUMBNAIL -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Portrait Thumbnails<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;gap:16px;align-items:flex-start;margin-bottom:20px\">\n          <!-- NPC / scene glyph -->\n          <div style=\"width:38px;height:38px;border:1px solid rgba(201,165,88,.42);border-radius:2px;background:radial-gradient(120% 110% at 50% 18%,#262016,#0c0a07);display:flex;align-items:center;justify-content:center\">\n            <span style=\"font-size:18px;color:#c9a558;opacity:.9;line-height:1\">⚗<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Small member -->\n          <div style=\"width:40px;height:48px;border:1px solid rgba(201,165,88,.42);border-radius:2px;background:radial-gradient(120% 110% at 50% 18%,#262016,#0c0a07);display:flex;align-items:center;justify-content:center\">\n            <span style=\"font-family:'Cinzel',serif;font-size:20px;color:#c9a558;opacity:.88;padding-top:3px\">T<\u002Fspan>\n          <\u002Fdiv>\n          <!-- PC card (blue) -->\n          <div style=\"width:50px;height:60px;border:1px solid #7aa6cf;border-radius:2px;background:radial-gradient(120% 90% at 50% 18%,#262016,#0c0a07);display:flex;align-items:center;justify-content:center\">\n            <span style=\"font-family:'Cinzel',serif;font-size:27px;color:#7aa6cf;opacity:.92;padding-top:3px\">S<\u002Fspan>\n          <\u002Fdiv>\n          <!-- Inspector large -->\n          <div style=\"width:96px;height:108px;border:1px solid rgba(201,165,88,.42);border-radius:2px;background:radial-gradient(120% 110% at 50% 18%,#262016,#0c0a07);display:flex;align-items:center;justify-content:center\">\n            <span style=\"font-family:'Cinzel',serif;font-size:48px;color:#c9a558;opacity:.8;padding-top:4px\">M<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <pre><code>/* Base */\nborder: 1px solid var(--line2); border-radius: 2px;\nbackground: radial-gradient(120% 110% at 50% 18%, var(--bg3), #0c0a07);\ndisplay: flex; align-items: center; justify-content: center;\n\n/* NPC / scene: glyph font-size ~50–60% of container; color: var(--gold) */\n/* PC (player): border: 1px solid var(--blue); glyph color: var(--blue) */\n/* Glyph: font-family: var(--fdisp); padding-top: 3–4px (Cinzel ascent fix) */<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- MESSAGE DIVIDER -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Message Divider<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;align-items:center;gap:14px;opacity:.55;margin-bottom:20px\">\n          <span style=\"flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,165,88,.42))\"><\u002Fspan>\n          <span style=\"width:5px;height:5px;border:1px solid #8a6f3a;transform:rotate(45deg);flex:none\"><\u002Fspan>\n          <span style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(201,165,88,.42),transparent)\"><\u002Fspan>\n        <\u002Fdiv>\n        <pre><code>display: flex; align-items: center; gap: 14px; opacity: .55;\n\n  left line:  flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--line2))\n  diamond:    width:5px; height:5px; border:1px solid var(--golddeep); transform:rotate(45deg)\n  right line: flex:1; height:1px; background: linear-gradient(90deg, var(--line2), transparent)<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- TYPING INDICATOR -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Typing Indicator<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;gap:5px;align-items:center;margin-bottom:20px\">\n          <span style=\"width:6px;height:6px;border-radius:50%;background:#c9a558;animation:wy-pulse 1.2s ease-in-out infinite;animation-delay:0s\"><\u002Fspan>\n          <span style=\"width:6px;height:6px;border-radius:50%;background:#c9a558;animation:wy-pulse 1.2s ease-in-out infinite;animation-delay:.22s\"><\u002Fspan>\n          <span style=\"width:6px;height:6px;border-radius:50%;background:#c9a558;animation:wy-pulse 1.2s ease-in-out infinite;animation-delay:.44s\"><\u002Fspan>\n        <\u002Fdiv>\n        <pre><code>@keyframes wy-pulse {\n  0%, 100% { opacity: .3 }\n  50%       { opacity: 1  }\n}\n\n/* Three gold dots */\nwidth: 6px; height: 6px; border-radius: 50%; background: var(--gold);\nanimation: wy-pulse 1.2s ease-in-out infinite;\nanimation-delay: 0s / .22s / .44s;<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- DECORATIVE ELEMENTS -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Decorative Elements<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;gap:32px;align-items:center;margin-bottom:20px\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n            <span style=\"width:18px;height:18px;border:1.5px solid #c9a558;transform:rotate(45deg)\"><\u002Fspan>\n            <span style=\"font-family:var(--fui);font-size:8px;letter-spacing:.1em;color:var(--textdim)\">Logo mark<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n            <span style=\"width:14px;height:14px;border:1.5px solid #c9a558;transform:rotate(45deg)\"><\u002Fspan>\n            <span style=\"font-family:var(--fui);font-size:8px;letter-spacing:.1em;color:var(--textdim)\">Nav mark<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n            <span style=\"width:5px;height:5px;border:1px solid #8a6f3a;transform:rotate(45deg)\"><\u002Fspan>\n            <span style=\"font-family:var(--fui);font-size:8px;letter-spacing:.1em;color:var(--textdim)\">Divider pip<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n            <span style=\"width:6px;height:6px;border-radius:50%;background:#c9a558;box-shadow:0 0 7px #c9a558\"><\u002Fspan>\n            <span style=\"font-family:var(--fui);font-size:8px;letter-spacing:.1em;color:var(--textdim)\">Status dot<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px\">\n            <div style=\"width:72px;height:40px;background-image:radial-gradient(rgba(201,165,88,.18) 1.1px,transparent 1.3px);background-size:21px 21px;background-color:#1b1710;border-radius:2px\"><\u002Fdiv>\n            <span style=\"font-family:var(--fui);font-size:8px;letter-spacing:.1em;color:var(--textdim)\">Dot grain<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <pre><code>/* Diamond logo mark */\nwidth: 18px; height: 18px; border: 1.5px solid var(--gold); transform: rotate(45deg);\n\n/* Status dot (online / active) */\nwidth: 6px; height: 6px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 7px var(--gold);\n\n/* Dot-grain texture (chat banner) */\nbackground-image: radial-gradient(rgba(201,165,88,.18) 1.1px, transparent 1.3px);\nbackground-size: 21px 21px;\n\n/* Blink caret (inline edit) */\n@keyframes wy-caret { 0%,48%{opacity:1} 49%,100%{opacity:0} }\nanimation: wy-caret 1.1s step-end infinite;<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- LOREBOOK ENTRY CARD -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Lorebook Entry Card<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:24px\">\n        <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:20px;max-width:520px\">\n          <div style=\"border:1px solid rgba(201,165,88,.42);border-radius:3px;background:var(--bg2);overflow:hidden\">\n            <div style=\"display:flex;align-items:center;gap:8px;padding:10px 12px\">\n              <span style=\"font-family:'Cinzel',serif;font-size:14px;color:#ece4d3;flex:1;padding-top:2px\">Salt Wraith<\u002Fspan>\n              <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:#6c654f\">🔑 wraith, salt, lights<\u002Fspan>\n              <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#100e0a;background:#c9a558;border-radius:2px;padding:4px 9px;cursor:pointer\">On<\u002Fspan>\n              <span style=\"font-size:14px;color:#6c654f;cursor:pointer\">✎<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:0 12px 10px;font-family:'Quicksand',sans-serif;font-size:12px;line-height:1.55;color:#9b927a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">A spectral remnant of a Lenskeeper who died mid-ritual. It drifts silently through the galleries…<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid rgba(201,165,88,.18);border-radius:3px;background:var(--bg2);overflow:hidden;opacity:.55\">\n            <div style=\"display:flex;align-items:center;gap:8px;padding:10px 12px\">\n              <span style=\"font-family:'Cinzel',serif;font-size:14px;color:#ece4d3;flex:1;padding-top:2px\">Stellar Compendium<\u002Fspan>\n              <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:#100e0a;background:#c9a558;border-radius:2px;padding:3px 7px\">Permanent<\u002Fspan>\n              <span style=\"font-family:'Hanken Grotesk',sans-serif;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#9b927a;border:1px solid rgba(201,165,88,.18);border-radius:2px;padding:4px 9px;cursor:pointer\">Off<\u002Fspan>\n              <span style=\"font-size:14px;color:#6c654f;cursor:pointer\">✎<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:0 12px 10px;font-family:'Quicksand',sans-serif;font-size:12px;line-height:1.55;color:#9b927a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">The observatory's master catalog of stellar observations, maintained for three centuries…<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <pre><code>/* Enabled */  border: 1px solid var(--line2); background: var(--bg2); opacity: 1;\n/* Disabled */ border: 1px solid var(--line);  background: var(--bg2); opacity: 0.55;\n\n/* Toggle chip: On  */ background: var(--gold);  color: #100e0a;\n/* Toggle chip: Off */ background: none; border: 1px solid var(--line); color: var(--textsec);<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- SCROLLBAR -->\n      <div style=\"font-family:var(--fui);font-size:8.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--textdim);margin-bottom:14px\">Scrollbar<\u002Fdiv>\n      <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:24px;margin-bottom:8px\">\n        <pre><code>::-webkit-scrollbar { width: 9px; height: 9px; }\n::-webkit-scrollbar-thumb { background: rgba(201,165,88,.24); border-radius: 9px; }\n::-webkit-scrollbar-track { background: transparent; }<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ═══════════════════════════ LAYOUT ═══════════════════════════ -->\n    <section id=\"layout\" style=\"padding-top:80px\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:32px\">\n        <span style=\"font-family:var(--fui);font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)\">06<\u002Fspan>\n        <span style=\"font-family:var(--fdisp);font-size:28px;color:var(--text);letter-spacing:.04em;padding-top:3px\">Layout<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:var(--line)\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--fbody);font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:24px\">The application shell is a 4-column CSS grid. Each column has a fixed role; the chat column is fluid.<\u002Fdiv>\n\n      <!-- Grid diagram -->\n      <div style=\"display:grid;grid-template-columns:66px 288px minmax(0,1fr) 344px;gap:4px;margin-bottom:24px\">\n        <div style=\"background:rgba(201,165,88,.12);border:1px solid var(--line);border-radius:2px;padding:12px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:80px\">\n          <div style=\"font-family:var(--fui);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);text-align:center\">Icon<br>Rail<\u002Fdiv>\n          <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--textdim)\">66px<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(201,165,88,.08);border:1px solid var(--line);border-radius:2px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px\">\n          <div style=\"font-family:var(--fui);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);text-align:center\">Left Panel<\u002Fdiv>\n          <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--textdim)\">288px<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(201,165,88,.05);border:1px solid var(--line);border-radius:2px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px\">\n          <div style=\"font-family:var(--fui);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);text-align:center\">Chat Area<\u002Fdiv>\n          <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--textdim)\">minmax(0, 1fr)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(201,165,88,.08);border:1px solid var(--line);border-radius:2px;padding:12px 8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px\">\n          <div style=\"font-family:var(--fui);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);text-align:center\">Inspector<\u002Fdiv>\n          <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:var(--textdim)\">344px<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <pre style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:20px;margin-bottom:32px\"><code>display: grid;\ngrid-template-columns: 66px 288px minmax(0, 1fr) 344px;\nwidth: 100vw; height: 100vh; overflow: hidden;<\u002Fcode><\u002Fpre>\n\n      <!-- Column notes -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n        <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:18px\">\n          <div style=\"font-family:var(--fui);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px\">Icon Rail · 66px<\u002Fdiv>\n          <div style=\"font-family:var(--fbody);font-size:12px;line-height:1.6;color:var(--text2)\">background: var(--bg2). Tab items are flex-column, center-aligned, 12px vertical padding. Active tab: 2px left gold bar + gold text. Inactive: var(--textsec) text.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:18px\">\n          <div style=\"font-family:var(--fui);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px\">Left Panel · 288px<\u002Fdiv>\n          <div style=\"font-family:var(--fbody);font-size:12px;line-height:1.6;color:var(--text2)\">background: var(--bg1). Flex-column, height 100vh. Fixed header (border-bottom, 20px padding) + scrollable body (flex:1, overflow-y:auto).<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:18px\">\n          <div style=\"font-family:var(--fui);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px\">Chat · fluid<\u002Fdiv>\n          <div style=\"font-family:var(--fbody);font-size:12px;line-height:1.6;color:var(--text2)\">background: linear-gradient(180deg, #13110c, #100e0a). Fixed scene banner (134px) + scrollable message list (flex:1) + fixed composer. Chat max-width: 660px, margin: 0 auto, padding: 0 34px.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:18px\">\n          <div style=\"font-family:var(--fui);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px\">Inspector · 344px<\u002Fdiv>\n          <div style=\"font-family:var(--fbody);font-size:12px;line-height:1.6;color:var(--text2)\">background: var(--bg1). Fixed header with entity portrait, View/Edit tab switcher + scrollable body. All entity kinds share the same shell; content swaps conditionally.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ═══════════════════════════ TOKEN REFERENCE ═══════════════════════════ -->\n    <section id=\"tokens\" style=\"padding-top:80px\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:32px\">\n        <span style=\"font-family:var(--fui);font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold)\">07<\u002Fspan>\n        <span style=\"font-family:var(--fdisp);font-size:28px;color:var(--text);letter-spacing:.04em;padding-top:3px\">Token Reference<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:var(--line)\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:var(--fbody);font-size:13px;line-height:1.65;color:var(--text2);margin-bottom:20px\">Copy this block onto the root layout element. All tokens are CSS custom properties; inline-style usage looks like <code style=\"display:inline;background:none;font-size:12px;color:var(--gold2)\">color: var(--gold)<\u002Fcode>.<\u002Fdiv>\n      <div style=\"border:1px solid var(--line2);border-radius:3px;background:var(--bg2);padding:24px 26px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px\">\n          <span style=\"font-family:var(--fui);font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)\">CSS Custom Properties<\u002Fspan>\n          <span id=\"copy-btn\" onclick=\"copyTokens()\" style=\"font-family:var(--fui);font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--textsec);border:1px solid var(--line);border-radius:2px;padding:5px 11px;cursor:pointer\" onmouseover=\"this.style.color='var(--gold2)'\" onmouseout=\"this.style.color='var(--textsec)'\">Copy<\u002Fspan>\n        <\u002Fdiv>\n        <code id=\"token-block\">/* ── Backgrounds ─────────────────────────── */\n--bg0: #100e0a;     /* near-black shell, chat area           */\n--bg1: #17140e;     /* primary panels, sidebars              */\n--bg2: #1e1a12;     /* cards, inputs, secondary panels       */\n--bg3: #262016;     /* elevated cards, icon thumbnails       */\n\n/* ── Borders ──────────────────────────────── */\n--line:  rgba(201,165,88,.18);  /* subtle dividers, card borders  */\n--line2: rgba(201,165,88,.42);  /* selection state, focus rings   */\n\n/* ── Gold accent ──────────────────────────── */\n--gold:     #c9a558;  /* primary: active tabs, CTAs, bars   */\n--gold2:    #e8cf8c;  /* brighter: hover, text highlights   */\n--golddeep: #8a6f3a;  /* muted: disabled, decorative        */\n\n/* ── Semantic ─────────────────────────────── */\n--blue: #7aa6cf;    /* player character                      */\n\n/* ── Text ─────────────────────────────────── */\n--text:    #ece4d3;  /* primary body text                    */\n--text2:   #cfc6b0;  /* narrator prose, descriptions         */\n--textsec: #9b927a;  /* subtitles, metadata, card labels     */\n--textdim: #6c654f;  /* placeholders, disabled, timestamps   */\n\n/* ── Fonts ────────────────────────────────── */\n--fdisp: 'Cinzel', serif;           /* names, headers, titles       */\n--fbody: 'Quicksand', sans-serif;   /* narration, descriptions      */\n--fui:   'Hanken Grotesk', sans-serif; /* all chrome, uppercase     */<\u002Fcode>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:20px;border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:20px 24px\">\n        <div style=\"font-family:var(--fui);font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:14px\">Google Fonts Import<\u002Fdiv>\n        <pre><code>&lt;link href=\"https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700\n  &amp;family=Quicksand:wght@400;500;600;700\n  &amp;family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap\" rel=\"stylesheet\"&gt;<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:20px;border:1px solid var(--line);border-radius:3px;background:var(--bg1);padding:20px 24px\">\n        <div style=\"font-family:var(--fui);font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:14px\">Rarity Literal Values (not tokens)<\u002Fdiv>\n        <pre><code>Common:    #8b8784   Uncommon: #5fa85a   Rare:      #4a86d8\nEpic:      #9d63c9   Legendary: #e0913a\n\n/* Danger (delete) */\ncolor:      #a96b54\nborder:     1px solid rgba(169,107,84,.35)\nhover-bg:   rgba(169,107,84,.10)\nhover-text: #c98e76   /* icon hover */<\u002Fcode><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid var(--line);padding:32px 48px;display:flex;align-items:center;gap:20px;max-width:960px\">\n    <span style=\"width:14px;height:14px;border:1.5px solid var(--golddeep);transform:rotate(45deg);flex:none\"><\u002Fspan>\n    <span style=\"font-family:var(--fui);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--textdim)\">Wayward Design System · 2026 · Dark Fantasy Narrator Interface<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<script>\nfunction copyTokens() {\n  const block = document.getElementById('token-block');\n  navigator.clipboard.writeText(block.textContent).then(() => {\n    const btn = document.getElementById('copy-btn');\n    btn.textContent = 'Copied!';\n    btn.style.color = 'var(--gold2)';\n    btn.style.borderColor = 'var(--line2)';\n    setTimeout(() => {\n      btn.textContent = 'Copy';\n      btn.style.color = 'var(--textsec)';\n      btn.style.borderColor = 'var(--line)';\n    }, 1800);\n  });\n}\n<\u002Fscript>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
